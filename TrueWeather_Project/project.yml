name: TrueWeather
options:
  bundleIdPrefix: com.business
targets:
  TrueWeather:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: TrueWeather
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "TrueWeather"
        CFBundleName: "TrueWeather"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
    settings:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
      DEVELOPMENT_TEAM: ""
      GENERATE_INFOPLIST_FILE: YES
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
