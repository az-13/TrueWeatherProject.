workflows:
  ios-unsigned-build:
    name: Build TrueWeather (iOS Unsigned IPA)
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Install Tools
        script: |
          brew install xcodegen
      - name: Extract Files Safely
        script: |
          # 1. Unzip the file into a temporary folder
          mkdir -p temp_unzip
          unzip -qo TrueWeather_Project.zip -d temp_unzip/ || true
          
          # 2. Create the destination folder project.yml expects
          mkdir -p TrueWeather
          
          # 3. Forcefully find ALL Swift and Asset files and move them directly into TrueWeather
          find temp_unzip -name "*.swift" -exec mv {} TrueWeather/ \;
          find temp_unzip -type d -name "*.xcassets" -exec mv {} TrueWeather/ \;
          
          # 4. Delete the messy temporary folder
          rm -rf temp_unzip
      - name: Cleanup Duplicate Configs
        script: |
          # Delete any Package.swift files that crash Xcode
          rm -f Package.swift TrueWeather/Package.swift
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Compile iOS App
        script: |
          xcodebuild build \
            -project "TrueWeather.xcodeproj" \
            -scheme "TrueWeather" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "build_output" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package into IPA file
        script: |
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/TrueWeather.app Payload/
          zip -qr TrueWeather.ipa Payload
    artifacts:
      - TrueWeather.ipa
