workflows:
  ios-unsigned-build:
    name: Build TrueWeather (iOS Unsigned IPA)
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Install Tools
        script: |
          brew install xcodegen
      - name: Cleanup Old Files
        script: |
          # Delete Swift Package files that crash Xcode
          rm -f TrueWeather/Package.swift
      - name: Generate Xcode Project
        script: |
          # Go INTO the TrueWeather folder where project.yml is actually hiding!
          cd TrueWeather
          xcodegen generate
      - name: Compile iOS App
        script: |
          # Go INTO the TrueWeather folder where the Xcode project was just made!
          cd TrueWeather
          xcodebuild build \
            -project "TrueWeather.xcodeproj" \
            -scheme "TrueWeather" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "build_output" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package into IPA file
        script: |
          # Go INTO the TrueWeather folder where the build output is!
          cd TrueWeather
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/TrueWeather.app Payload/
          zip -qr TrueWeather.ipa Payload
    artifacts:
      - TrueWeather/TrueWeather.ipa
