workflows:
  ios-unsigned-build:
    name: Build TrueWeather (iOS Unsigned IPA)
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Install Tools
        script: |
          brew install xcodegen
      - name: Extract Files
        script: |
          # Extract exactly into a clean folder
          unzip -qo TrueWeather_Project.zip -d extracted/ || true
          # Move just the Swift files up
          mv extracted/TrueWeather . || true
          rm -rf extracted/
      - name: Cleanup Unnecessary Files
        script: |
          # Prevent Xcode from seeing conflicting files
          rm -f Package.swift TrueWeather/Package.swift
      - name: Generate Xcode Project
        script: |
          xcodegen generate
      - name: Compile iOS App
        script: |
          xcodebuild build \
            -project "TrueWeather.xcodeproj" \
            -scheme "TrueWeather" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "build_output" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package into IPA file
        script: |
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/TrueWeather.app Payload/
          zip -qr TrueWeather.ipa Payload
    artifacts:
      - TrueWeather.ipa
