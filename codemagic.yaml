workflows:
  ios-unsigned-build:
    name: Build TrueWeather (iOS Unsigned IPA)
    instance_type: mac_mini_m1
    environment:
      xcode: latest
    scripts:
      - name: Install Tools
        script: |
          brew install xcodegen
      - name: Unzip Source Code
        script: |
          unzip -qo TrueWeather_Project.zip || true
      - name: Cleanup Old Files
        script: |
          rm -f Package.swift
          rm -f TrueWeather/Package.swift
          rm -f TrueWeather/TrueWeather/Package.swift
      - name: Generate Xcode Project
        script: |
          # The project.yml is inside the first TrueWeather folder!
          cd TrueWeather
          xcodegen generate
      - name: Compile iOS App
        script: |
          # Build the Xcode project we just made inside that folder!
          cd TrueWeather
          xcodebuild build \
            -project "TrueWeather.xcodeproj" \
            -scheme "TrueWeather" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "build_output" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package into IPA file
        script: |
          cd TrueWeather
          mkdir -p Payload
          cp -r build_output/Build/Products/Release-iphoneos/TrueWeather.app Payload/
          zip -qr TrueWeather.ipa Payload
    artifacts:
      - TrueWeather/TrueWeather.ipa
